<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Device Management - Profile</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>IoT Device Management</h1>
    </header>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/devices">Devices</a>
        <a href="/analytics">Analytics</a>
        <a href="/profile" class="active">Profile</a>
    </nav>
    <main class="container mt-5">
        <h1 class="mb-4">User Profile</h1>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Username: {{ user_profile.username }}</h5>
                <p class="card-text">Email: {{ user_profile.email }}</p>
                <p class="card-text">Preferences: {{ user_profile.preferences }}</p>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2023 IoT Device Management</p>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
