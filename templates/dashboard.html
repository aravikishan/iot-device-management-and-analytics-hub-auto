<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Device Management - Dashboard</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>IoT Device Management</h1>
    </header>
    <nav>
        <a href="/" class="active">Dashboard</a>
        <a href="/devices">Devices</a>
        <a href="/analytics">Analytics</a>
        <a href="/profile">Profile</a>
    </nav>
    <main class="container mt-5">
        <h1 class="mb-4">Dashboard</h1>
        <div class="row">
            {% for device in devices %}
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Device {{ device.id }}</h5>
                        <p class="card-text">Type: {{ device.type }}</p>
                        <p class="card-text">Status: {{ device.status }}</p>
                        <p class="card-text">Last Updated: {{ device.last_updated }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
    <footer>
        <p>&copy; 2023 IoT Device Management</p>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
